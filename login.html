<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaFlow - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-capsules"></i>
                </div>
                <h1>PharmaFlow</h1>
                <p>Pharmacy Management System</p>
            </div>

            <div id="login-error" class="alert alert-error" style="display:none;"></div>
            <div id="login-success" class="alert alert-success" style="display:none;"></div>

            <!-- Login Form -->
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="Enter your email" required autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="remember-me">
                        <span>Remember me</span>
                    </label>
                    <a href="#" id="forgot-password-link" class="forgot-link">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="login-btn">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- Forgot Password Form -->
            <form id="forgot-password-form" class="login-form" style="display:none;">
                <div class="form-group">
                    <label for="reset-email">Email Address</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="reset-email" placeholder="Enter your email" required autocomplete="email">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="reset-btn">
                    <span>Send Reset Link</span>
                    <i class="fas fa-paper-plane"></i>
                </button>git push -u https://humphreyabwao@github.com/humphreyabwao/Multibranch-Pharmacy-system.git main
                <button type="button" class="btn btn-outline btn-full" id="back-to-login" style="margin-top:10px;">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back to Login</span>
                </button>
            </form>

            <div class="login-footer">
                <p>&copy; <span id="footer-year"></span> PharmaFlow. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Set dynamic year
        document.getElementById('footer-year').textContent = new Date().getFullYear();

        // Dynamic branding from settings (cached in localStorage)
        (function () {
            try {
                var brand = localStorage.getItem('pf_brand_name');
                var tagline = localStorage.getItem('pf_brand_tagline');
                var icon = localStorage.getItem('pf_brand_icon');
                if (brand) {
                    var h1 = document.querySelector('.login-header h1');
                    if (h1) h1.textContent = brand;
                    document.title = brand + ' - Login';
                    var footer = document.querySelector('.login-footer p');
                    if (footer) footer.innerHTML = '&copy; ' + new Date().getFullYear() + ' ' + brand + '. All rights reserved.';
                }
                if (tagline) {
                    var p = document.querySelector('.login-header p');
                    if (p) p.textContent = tagline;
                }
                if (icon) {
                    var iconEl = document.querySelector('.login-logo i');
                    if (iconEl) iconEl.className = icon;
                }
            } catch (e) { /* ignore */ }
        })();
    </script>
</body>
</html>
